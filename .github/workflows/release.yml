name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: belovodya-release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare release version
        id: prepare_release
        run: node scripts/prepare-release.mjs

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Build frontend bundle
        run: npm run build
        working-directory: frontend

      - name: Validate integration files
        run: |
          python3 -m json.tool custom_components/belovodya_ui/manifest.json >/dev/null
          python3 -m compileall custom_components/belovodya_ui >/dev/null

      - name: Commit release artifacts
        id: commit_release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "commit_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add custom_components/belovodya_ui/manifest.json \
                  custom_components/belovodya_ui/const.py \
                  custom_components/belovodya_ui/static/belovodya-ui.js \
                  dist/belovodya-ui.js
          git commit -m "chore: release v${{ steps.prepare_release.outputs.release_version }} [skip ci]"
          git push origin HEAD:main
          echo "commit_created=true" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.prepare_release.outputs.tag_name }}"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists"
            exit 0
          fi

          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_release.outputs.tag_name }}
          name: ${{ steps.prepare_release.outputs.tag_name }}
          generate_release_notes: true
          files: |
            dist/belovodya-ui.js
            custom_components/belovodya_ui/static/belovodya-ui.js
